services:
  # --- Grafana: Dashboards & Alerting ---
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Prometheus: Metrics Collection ---
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Loki: Log Aggregation ---
  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # --- Promtail: Log Shipping ---
  promtail:
    image: grafana/promtail:2.9.6
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MARKFLOW_LOGS_PATH:-./logs}:/var/log/markflow:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Blackbox Exporter: HTTP Probing ---
  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox
    restart: unless-stopped
    ports:
      - "${BLACKBOX_PORT:-9115}:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/config.yml:ro
    command: --config.file=/etc/blackbox/config.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- MarkFlow Metrics Exporter: Bridges MarkFlow API to Prometheus ---
  markflow-exporter:
    build: ./exporter
    container_name: markflow-exporter
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-9101}:9101"
    environment:
      - MARKFLOW_URL=${MARKFLOW_URL:-http://host.docker.internal:8000}
      - SCRAPE_INTERVAL=30
      - EXPORTER_PORT=9101
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
