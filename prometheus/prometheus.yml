global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Blackbox exporter - probes MarkFlow API endpoints
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:8000/api/health
        labels:
          service: markflow
          endpoint: health
      - targets:
          - http://host.docker.internal:8000/docs
        labels:
          service: markflow
          endpoint: docs
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # MarkFlow metrics exporter - bridges /api/admin/system/metrics to Prometheus
  - job_name: "markflow-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["markflow-exporter:9101"]
        labels:
          service: markflow

  # Blackbox exporter self-metrics
  - job_name: "blackbox"
    static_configs:
      - targets: ["blackbox:9115"]
