server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs - auto-discovers all containers on the host
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only keep containers with specific names (markflow, meilisearch, etc.)
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(?:markflow|meilisearch|doc.conversion).*"
        action: keep
      # Use container name as label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Use image name as label
      - source_labels: ["__meta_docker_container_image"]
        target_label: image
      # Add service label based on container name
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(?:markflow|doc.conversion).*"
        target_label: service
        replacement: markflow
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*meilisearch.*"
        target_label: service
        replacement: meilisearch
    pipeline_stages:
      # Try to parse structlog JSON output from MarkFlow
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            timestamp: timestamp
            request_id: request_id
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
      # Set log level label from parsed JSON
      - labels:
          level:
          logger:
      # Set timestamp from structlog timestamp if available
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z"
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
            - "2006-01-02 15:04:05"
          action_on_failure: fudge

  # MarkFlow log files (if mounted via volume)
  - job_name: markflow-logfiles
    static_configs:
      - targets:
          - localhost
        labels:
          job: markflow-logs
          service: markflow
          __path__: /var/log/markflow/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            timestamp: timestamp
            request_id: request_id
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z"
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
            - "2006-01-02 15:04:05"
          action_on_failure: fudge
